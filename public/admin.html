<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Question pour un Impérien</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --or: #C9A84C;
    --or-clair: #F0D080;
    --or-fonce: #8B6914;
    --noir: #0A0A0A;
    --noir-card: #141414;
    --noir-panel: #1A1A1A;
    --rouge: #8B0000;
    --rouge-clair: #CC0000;
    --vert: #1a4a1a;
    --vert-clair: #2d8a2d;
    --blanc: #F5F0E8;
    --gris: #888;
    --glow: 0 0 20px rgba(201,168,76,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--noir); color: var(--blanc); font-family: 'Raleway', sans-serif; min-height: 100vh; }

  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1500 0%, var(--noir) 70%);
  }
  .login-box {
    text-align: center; padding: 40px; background: var(--noir-card);
    border: 1px solid var(--or-fonce); border-radius: 8px; width: 320px;
  }
  .login-title { font-family: 'Cinzel Decorative', serif; font-size: 16px; color: var(--or); margin-bottom: 24px; letter-spacing: 2px; }
  .login-input {
    width: 100%; padding: 14px; background: rgba(201,168,76,0.05);
    border: 1px solid var(--or-fonce); border-radius: 4px;
    color: var(--or-clair); font-family: 'Cinzel', serif; font-size: 16px;
    text-align: center; outline: none; letter-spacing: 4px; margin-bottom: 14px;
  }
  .login-input:focus { border-color: var(--or); box-shadow: var(--glow); }
  .login-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--or-fonce), var(--or));
    border: none; border-radius: 4px; color: var(--noir); font-family: 'Cinzel', serif;
    font-size: 13px; font-weight: 700; letter-spacing: 3px; cursor: pointer;
  }
  .login-error { color: #FF4444; font-size: 12px; margin-top: 10px; min-height: 18px; }

  #admin-screen { display: none; }
  .admin-header {
    background: var(--noir-card); border-bottom: 1px solid var(--or-fonce);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .admin-title { font-family: 'Cinzel Decorative', serif; font-size: 14px; color: var(--or); letter-spacing: 2px; }
  .status-badge {
    padding: 5px 12px; border-radius: 20px; font-size: 11px; font-family: 'Cinzel', serif;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .status-lobby { background: rgba(201,168,76,0.1); border: 1px solid var(--or-fonce); color: var(--or); }
  .status-playing { background: rgba(76,175,80,0.1); border: 1px solid #4CAF50; color: #4CAF50; }

  .admin-body { padding: 16px; max-width: 900px; margin: 0 auto; }

  .card {
    background: var(--noir-card); border: 1px solid rgba(201,168,76,0.15);
    border-radius: 8px; padding: 16px; margin-bottom: 14px;
  }
  .card-title {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px;
    color: var(--or-fonce); text-transform: uppercase; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-box {
    background: var(--noir-card); border: 1px solid rgba(201,168,76,0.15);
    border-radius: 6px; padding: 12px; text-align: center;
  }
  .stat-num { font-family: 'Cinzel Decorative', serif; font-size: 28px; color: var(--or); }
  .stat-label { font-size: 10px; letter-spacing: 2px; color: var(--gris); text-transform: uppercase; margin-top: 4px; }

  .btn {
    padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-gold { background: linear-gradient(135deg, var(--or-fonce), var(--or)); color: var(--noir); }
  .btn-danger { background: var(--rouge); color: white; }
  .btn-danger:hover { background: var(--rouge-clair); }
  .btn-success { background: var(--vert-clair); color: white; }
  .btn-ghost { background: transparent; border: 1px solid rgba(201,168,76,0.3); color: var(--or-fonce); }
  .btn-ghost:hover { border-color: var(--or); color: var(--or); }
  .btn-pause { background: #2a2a00; border: 1px solid #888800; color: #CCCC00; }
  .btn-pause.active { background: #222; border-color: var(--or-fonce); color: var(--or-fonce); }
  .btn-sm { padding: 6px 12px; font-size: 10px; }

  .controls-row { display: flex; flex-wrap: wrap; gap: 8px; }

  .player-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05); border-radius: 6px;
    margin-bottom: 6px;
  }
  .player-item.eliminated { opacity: 0.45; background: rgba(139,0,0,0.08); border-color: rgba(139,0,0,0.2); }
  .player-rank { font-family: 'Cinzel Decorative', serif; font-size: 14px; color: var(--or-fonce); width: 24px; }
  .player-pseudo { font-family: 'Cinzel', serif; font-size: 14px; color: var(--blanc); flex: 1; }
  .player-score { font-family: 'Cinzel', serif; font-size: 14px; color: var(--or); min-width: 70px; text-align: right; }
  .player-answer-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-family: 'Cinzel', serif; letter-spacing: 1px;
  }
  .badge-answered { background: rgba(76,175,80,0.15); border: 1px solid #4CAF50; color: #4CAF50; }
  .badge-waiting { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--gris); }
  .badge-eliminated { background: rgba(139,0,0,0.15); border: 1px solid var(--rouge); color: #FF4444; }

  /* ── QUESTIONS EDITOR — FIXED ── */
  .question-editor { display: none; }
  .question-editor.active { display: block; }
  .round-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .round-tab {
    padding: 6px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; cursor: pointer; font-size: 11px; font-family: 'Cinzel', serif;
    letter-spacing: 1px; color: var(--gris); transition: all 0.2s;
  }
  .round-tab.active { background: rgba(201,168,76,0.1); border-color: var(--or); color: var(--or); }

  .q-block {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 6px; padding: 14px; margin-bottom: 10px;
  }
  .q-num { font-family: 'Cinzel', serif; font-size: 11px; color: var(--or-fonce); letter-spacing: 3px; margin-bottom: 8px; }
  .q-input, .c-input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; padding: 10px 12px; color: var(--blanc);
    font-family: 'Raleway', sans-serif; font-size: 14px; outline: none; margin-bottom: 6px;
  }
  .q-input:focus, .c-input:focus { border-color: var(--or-fonce); }
  .c-row { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
  .c-letter { font-family: 'Cinzel', serif; font-size: 14px; color: var(--or); width: 20px; }
  .correct-radio { accent-color: var(--or); cursor: pointer; width: 16px; height: 16px; }
  .correct-label { font-size: 11px; color: var(--gris); }

  .add-q-btn {
    width: 100%; padding: 10px; background: rgba(201,168,76,0.04);
    border: 1px dashed rgba(201,168,76,0.2); border-radius: 4px;
    color: var(--or-fonce); font-family: 'Cinzel', serif; font-size: 11px;
    letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
  }
  .add-q-btn:hover { border-color: var(--or); color: var(--or); }

  /* Questions loaded counter */
  .q-loaded-badge {
    display: inline-block; background: rgba(76,175,80,0.15); border: 1px solid #4CAF50;
    color: #4CAF50; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
    padding: 3px 10px; border-radius: 10px; margin-left: 10px;
  }

  .answer-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .progress-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--or-fonce), var(--or)); transition: width 0.3s; width: 0%; }
  .progress-text { font-family: 'Cinzel', serif; font-size: 13px; color: var(--or); min-width: 60px; text-align: right; }

  .choice-bar-row { display:flex;align-items:center;gap:8px;margin-bottom:8px; }
  .choice-bar-letter { font-family:'Cinzel Decorative',serif;font-size:15px;color:var(--or);width:20px;flex-shrink:0; }
  .choice-bar-label { font-family:'Raleway',sans-serif;font-size:12px;color:var(--blanc);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .choice-bar-bg { width:100px;height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;flex-shrink:0; }
  .choice-bar-fill { height:100%;background:linear-gradient(90deg,var(--or-fonce),var(--or));border-radius:4px;transition:width 0.4s;width:0%; }
  .choice-bar-count { font-family:'Cinzel',serif;font-size:12px;color:var(--or);width:24px;text-align:right;flex-shrink:0; }

  .notif {
    position: fixed; top: 20px; right: 20px; padding: 12px 20px;
    background: var(--noir-card); border: 1px solid var(--or); border-radius: 6px;
    font-family: 'Cinzel', serif; font-size: 12px; color: var(--or); letter-spacing: 2px;
    z-index: 100; transform: translateX(200px); opacity: 0; transition: all 0.3s;
  }
  .notif.show { transform: translateX(0); opacity: 1; }

  select {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px; padding: 10px 12px; color: var(--or); font-family: 'Cinzel', serif;
    font-size: 13px; outline: none; cursor: pointer;
  }
</style>
</head>
<body>

<div class="notif" id="notif"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">⚔ ACCÈS MAÎTRE DU JEU</div>
    <input type="password" class="login-input" id="admin-password" placeholder="••••••••" autocomplete="off">
    <button class="login-btn" id="admin-login-btn">ENTRER</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-screen">
  <div class="admin-header">
    <div class="admin-title">⚔ Panel Maître du Jeu</div>
    <div class="status-badge status-lobby" id="phase-badge">LOBBY</div>
  </div>

  <div class="admin-body">

    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Joueurs</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-active">0</div><div class="stat-label">En jeu</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-eliminated">0</div><div class="stat-label">Éliminés</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-answered">0</div><div class="stat-label">Ont répondu</div></div>
    </div>

    <!-- CONTRÔLES -->
    <div class="card">
      <div class="card-title">Contrôles de Partie</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
        <label style="font-size:12px;color:var(--gris);">Manche à lancer :</label>
        <select id="round-select"></select>
      </div>
      <div class="controls-row">
        <button class="btn btn-ghost" id="btn-show-rules">📜 Afficher les règles</button>
        <button class="btn btn-gold" id="btn-start-round">▶ Lancer la manche</button>
        <button class="btn btn-gold" id="btn-launch-questions" style="display:none">🚀 Démarrer les questions</button>
        <button class="btn btn-gold" id="btn-next-question" style="display:none">⏭ Question suivante</button>
        <button class="btn btn-ghost" id="btn-reveal" style="display:none">👁 Révéler réponse</button>
        <button class="btn btn-pause" id="btn-pause">⏸ Pause</button>
        <button class="btn btn-success" id="btn-final">⚔ FINALE</button>
        <button class="btn btn-danger" id="btn-end-game">🏆 Terminer la partie</button>
        <button class="btn btn-ghost" id="btn-reset" style="opacity:0.5">↺ Reset complet</button>
      </div>
    </div>

    <!-- QUESTION EN COURS -->
    <div class="card" id="live-question-card" style="display:none">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Question en cours</span>
        <span id="admin-timer" style="font-family:'Cinzel Decorative',serif;font-size:22px;color:var(--or);">30</span>
      </div>
      <div id="live-question-text" style="font-family:'Cinzel',serif;font-size:14px;color:var(--blanc);margin-bottom:14px;line-height:1.5;"></div>
      <div id="live-choices"></div>
    </div>

    <!-- PROGRESSION RÉPONSES -->
    <div class="card" id="answer-progress-card" style="display:none">
      <div class="card-title">Progression des Réponses</div>
      <div class="answer-progress">
        <div class="progress-bar-bg"><div class="progress-bar" id="answer-prog-bar"></div></div>
        <div class="progress-text" id="answer-prog-text">0 / 0</div>
      </div>
    </div>

    <!-- DERNIERS MOTS -->
    <div class="card" id="farewell-card" style="display:none">
      <div class="card-title">💀 Derniers Mots</div>
      <div id="farewell-list"></div>
    </div>

    <!-- JOUEURS -->
    <div class="card">
      <div class="card-title">Légionnaires</div>
      <div id="players-list">
        <div style="color:var(--gris);font-size:13px;text-align:center;padding:20px;">En attente de connexions...</div>
      </div>
    </div>

    <!-- ÉDITEUR DE QUESTIONS -->
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <span>
          Questions du Quiz
          <span id="q-loaded-badge" class="q-loaded-badge" style="display:none">✓ Chargées</span>
        </span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" id="btn-toggle-editor">✏ Éditer</button>
          <button class="btn btn-gold btn-sm" id="btn-save-questions">💾 Sauvegarder & Charger</button>
        </div>
      </div>
      <div class="question-editor" id="question-editor">
        <div class="round-tabs" id="round-tabs"></div>
        <div id="questions-container"></div>
        <button class="add-q-btn" id="btn-add-question">+ Ajouter une question</button>
      </div>
      <div id="editor-closed-msg" style="color:var(--gris);font-size:13px;text-align:center;padding:10px;">
        Clique sur "Éditer" pour saisir tes questions
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════
const WS_URL = `wss://${location.host}`;
const ROUND_NAMES = [
  'Épreuve du Bronze', "Sanctuaire d'Argent", 'Jugement des Gold Saints',
  'Nuit de Shura', "Réveil d'Athéna", 'Tempête du Cosmos',
  'Ultime Chrysaor', 'LE CHAMP ÉLYSÉE'
];
const LETTERS = ['A','B','C','D'];

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let ws;
let gameData = { players: {}, phase: 'lobby' };
let currentRoundEditing = 0;
let answeredCount = 0;
let activeCount = 0;
let currentQuestionData = null;
let choiceVotes = [];
let paused = false;

// ── questionsData : source de vérité, JAMAIS écrasée sans sauvegarde ──
// Structure : Array(8) de Array(n) de { question:'', choices:['','','',''], correct:0 }
let questionsData = initEmptyQuestions();

function initEmptyQuestions() {
  return Array.from({length: 8}, () => [
    { question: '', choices: ['', '', '', ''], correct: 0 }
  ]);
}

// ═══════════════════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════════════════
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {};
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = () => setTimeout(connect, 2000);
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  } else if (ws) {
    ws.addEventListener('open', () => ws.send(JSON.stringify(obj)), { once: true });
  }
}

function notify(text) {
  const n = document.getElementById('notif');
  n.textContent = text;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════════════════════
// MESSAGES WS
// ═══════════════════════════════════════════════════════════════════════
function handleMsg(msg) {
  switch(msg.type) {
    case 'admin_ok':
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      buildRoundSelect();
      notify('✅ Connecté en tant que Maître du Jeu');
      break;
    case 'error':
      document.getElementById('login-error').textContent = msg.message;
      break;
    case 'game_state':
      gameData = msg;
      renderAll();
      break;
    case 'questions_loaded':
      notify(`✅ ${msg.rounds} manche(s) chargée(s) !`);
      document.getElementById('q-loaded-badge').style.display = 'inline-block';
      break;
    case 'timer':
      document.getElementById('admin-timer').textContent = msg.value;
      document.getElementById('admin-timer').style.color = msg.value <= 10 ? '#FF4444' : 'var(--or)';
      break;
    case 'question':
      currentQuestionData = msg;
      choiceVotes = new Array(msg.choices.length).fill(0);
      showLiveQuestion(msg);
      document.getElementById('admin-timer').textContent = '30';
      document.getElementById('admin-timer').style.color = 'var(--or)';
      break;
    case 'answer_count':
      answeredCount = msg.answered;
      activeCount = msg.total;
      document.getElementById('stat-answered').textContent = answeredCount;
      const pct = activeCount > 0 ? (answeredCount / activeCount * 100) : 0;
      document.getElementById('answer-prog-bar').style.width = pct + '%';
      document.getElementById('answer-prog-text').textContent = `${answeredCount} / ${activeCount}`;
      document.getElementById('answer-progress-card').style.display = 'block';
      if (msg.choiceVotes) { choiceVotes = msg.choiceVotes; updateChoiceBars(); }
      break;
    case 'farewell_message':
      showFarewellMsg(msg.pseudo, msg.message);
      break;
    case 'player_joined':
      notify(`⚔ ${msg.pseudo} a rejoint la salle`);
      break;
    case 'eliminated':
      notify(`💀 ${msg.pseudo} a été éliminé`);
      break;
    case 'round_end':
      document.getElementById('btn-next-question').style.display = 'none';
      document.getElementById('btn-reveal').style.display = 'none';
      document.getElementById('btn-launch-questions').style.display = 'none';
      document.getElementById('answer-progress-card').style.display = 'none';
      document.getElementById('live-question-card').style.display = 'none';
      document.getElementById('farewell-card').style.display = 'none';
      document.getElementById('farewell-list').innerHTML = '';
      notify('🏁 Fin de manche !');
      break;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function renderAll() { renderStats(); renderPlayers(); renderPhase(); }

function renderStats() {
  const players = Object.values(gameData.players || {});
  document.getElementById('stat-total').textContent = players.length;
  document.getElementById('stat-active').textContent = players.filter(p => !p.eliminated).length;
  document.getElementById('stat-eliminated').textContent = players.filter(p => p.eliminated).length;
}

function renderPhase() {
  const badge = document.getElementById('phase-badge');
  const phase = gameData.phase;
  badge.textContent = phase.toUpperCase().replace('_', ' ');
  badge.className = 'status-badge ' + (phase === 'playing' ? 'status-playing' : 'status-lobby');
}

function renderPlayers() {
  const list = document.getElementById('players-list');
  const players = Object.values(gameData.players || {}).sort((a, b) => b.score - a.score);
  if (!players.length) {
    list.innerHTML = '<div style="color:var(--gris);font-size:13px;text-align:center;padding:20px;">En attente de connexions...</div>';
    return;
  }
  list.innerHTML = '';
  players.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'player-item' + (p.eliminated ? ' eliminated' : '');
    const badge = p.eliminated
      ? '<span class="player-answer-badge badge-eliminated">💀 ÉLIMINÉ</span>'
      : p.answered
        ? '<span class="player-answer-badge badge-answered">✓ Répondu</span>'
        : '<span class="player-answer-badge badge-waiting">En attente</span>';
    const btn = p.eliminated
      ? `<button class="btn btn-ghost btn-sm" onclick="restorePlayer('${p.id}')">↩ Remettre</button>`
      : `<button class="btn btn-danger btn-sm" onclick="eliminatePlayer('${p.id}')">💀 Élim.</button>`;
    div.innerHTML = `
      <span class="player-rank">${i + 1}</span>
      <span class="player-pseudo">${p.pseudo}</span>
      ${badge}
      <span class="player-score">${(p.score || 0).toLocaleString()} pts</span>
      ${btn}
    `;
    list.appendChild(div);
  });
}

function showLiveQuestion(msg) {
  document.getElementById('live-question-card').style.display = 'block';
  document.getElementById('live-question-text').textContent = msg.question;
  const container = document.getElementById('live-choices');
  container.innerHTML = '';
  msg.choices.forEach((choice, i) => {
    const row = document.createElement('div');
    row.className = 'choice-bar-row';
    row.innerHTML = `
      <span class="choice-bar-letter">${LETTERS[i]}</span>
      <span class="choice-bar-label">${choice}</span>
      <div class="choice-bar-bg"><div class="choice-bar-fill" id="bar-fill-${i}"></div></div>
      <span class="choice-bar-count" id="bar-count-${i}">0</span>
    `;
    container.appendChild(row);
  });
}

function updateChoiceBars() {
  const total = choiceVotes.reduce((a, b) => a + b, 0);
  choiceVotes.forEach((votes, i) => {
    const fill = document.getElementById(`bar-fill-${i}`);
    const count = document.getElementById(`bar-count-${i}`);
    if (fill) fill.style.width = total > 0 ? (votes / total * 100) + '%' : '0%';
    if (count) count.textContent = votes;
  });
}

function showFarewellMsg(pseudo, message) {
  document.getElementById('farewell-card').style.display = 'block';
  const div = document.createElement('div');
  div.style.cssText = 'padding:10px;border-bottom:1px solid rgba(201,168,76,0.1);';
  div.innerHTML = `<span style="font-family:'Cinzel',serif;font-size:13px;color:var(--or);">💀 ${pseudo}</span><div style="font-family:'Raleway',sans-serif;font-size:13px;color:var(--blanc);margin-top:4px;font-style:italic;">"${message}"</div>`;
  document.getElementById('farewell-list').appendChild(div);
  notify(`💬 Dernier mot de ${pseudo}`);
}

function eliminatePlayer(id) { send({ type: 'eliminate', playerId: id }); }
function restorePlayer(id) { send({ type: 'restore', playerId: id }); }

// ═══════════════════════════════════════════════════════════════════════
// ROUND SELECT
// ═══════════════════════════════════════════════════════════════════════
function buildRoundSelect() {
  const sel = document.getElementById('round-select');
  sel.innerHTML = '';
  ROUND_NAMES.forEach((name, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `Manche ${i+1} — ${name}`;
    sel.appendChild(opt);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// ÉDITEUR DE QUESTIONS — VERSION CORRIGÉE
// ═══════════════════════════════════════════════════════════════════════

/**
 * FONCTION CLÉ : lit tous les inputs du DOM et sauvegarde dans questionsData
 * À appeler AVANT toute reconstruction du DOM (changement d'onglet, ajout de question, etc.)
 */
function saveCurrentRoundFromDOM() {
  const container = document.getElementById('questions-container');
  if (!container || !container.children.length) return;

  const blocks = container.querySelectorAll('.q-block');
  blocks.forEach((block, qi) => {
    if (!questionsData[currentRoundEditing][qi]) return;

    // Lire l'énoncé
    const qInput = block.querySelector('.q-input');
    if (qInput) questionsData[currentRoundEditing][qi].question = qInput.value;

    // Lire les choix
    const cInputs = block.querySelectorAll('.c-input');
    cInputs.forEach((inp, ci) => {
      questionsData[currentRoundEditing][qi].choices[ci] = inp.value;
    });

    // Lire la bonne réponse
    const radios = block.querySelectorAll('.correct-radio');
    radios.forEach((radio, ci) => {
      if (radio.checked) questionsData[currentRoundEditing][qi].correct = ci;
    });
  });
}

function buildRoundTabs() {
  const tabs = document.getElementById('round-tabs');
  tabs.innerHTML = '';
  ROUND_NAMES.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'round-tab' + (i === currentRoundEditing ? ' active' : '');
    div.textContent = `M${i+1}`;
    div.title = name;
    div.addEventListener('click', () => {
      saveCurrentRoundFromDOM();   // ← SAUVEGARDER avant de changer d'onglet
      currentRoundEditing = i;
      buildRoundTabs();
      buildQuestionsUI();
    });
    tabs.appendChild(div);
  });
}

function buildQuestionsUI() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  const roundQs = questionsData[currentRoundEditing];

  roundQs.forEach((q, qi) => {
    const block = document.createElement('div');
    block.className = 'q-block';
    block.dataset.qi = qi;

    // Énoncé
    const qNum = document.createElement('div');
    qNum.className = 'q-num';
    qNum.textContent = `— QUESTION ${qi+1} —`;
    block.appendChild(qNum);

    const qInput = document.createElement('input');
    qInput.type = 'text';
    qInput.className = 'q-input';
    qInput.placeholder = 'Énoncé de la question...';
    qInput.value = q.question;
    // PAS de oninput qui relit questionsData — on lit au moment de sauvegarder
    block.appendChild(qInput);

    // Choix A B C D
    q.choices.forEach((choice, ci) => {
      const row = document.createElement('div');
      row.className = 'c-row';

      const letter = document.createElement('span');
      letter.className = 'c-letter';
      letter.textContent = LETTERS[ci];
      row.appendChild(letter);

      const cInput = document.createElement('input');
      cInput.type = 'text';
      cInput.className = 'c-input';
      cInput.placeholder = `Choix ${LETTERS[ci]}...`;
      cInput.value = choice;
      row.appendChild(cInput);

      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.className = 'correct-radio';
      radio.name = `correct_${currentRoundEditing}_${qi}`;
      radio.checked = q.correct === ci;
      row.appendChild(radio);

      const label = document.createElement('label');
      label.className = 'correct-label';
      label.textContent = 'Correct';
      row.appendChild(label);

      block.appendChild(row);
    });

    container.appendChild(block);
  });
}

// Toggle éditeur
document.getElementById('btn-toggle-editor').addEventListener('click', () => {
  const editor = document.getElementById('question-editor');
  const msg = document.getElementById('editor-closed-msg');
  const isOpen = editor.classList.contains('active');
  if (isOpen) {
    saveCurrentRoundFromDOM(); // ← SAUVEGARDER avant de fermer
    editor.classList.remove('active');
    msg.style.display = 'block';
  } else {
    editor.classList.add('active');
    msg.style.display = 'none';
    buildRoundTabs();
    buildQuestionsUI();
  }
});

// Ajouter une question
document.getElementById('btn-add-question').addEventListener('click', () => {
  saveCurrentRoundFromDOM(); // ← SAUVEGARDER avant de reconstruire
  questionsData[currentRoundEditing].push({ question: '', choices: ['', '', '', ''], correct: 0 });
  buildQuestionsUI();
  // Scroller vers le bas pour voir la nouvelle question
  setTimeout(() => {
    const container = document.getElementById('questions-container');
    container.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
});

// Sauvegarder & charger sur le serveur
document.getElementById('btn-save-questions').addEventListener('click', () => {
  saveCurrentRoundFromDOM(); // ← SAUVEGARDER le round en cours avant d'envoyer

  // Filtrer les questions dont l'énoncé est vide, garder les manches non vides
  const filtered = questionsData.map(round =>
    round.filter(q => q.question.trim() !== '')
  ).filter(round => round.length > 0);

  if (!filtered.length) {
    notify('❌ Aucune question saisie !');
    return;
  }

  // Compter le total
  const total = filtered.reduce((acc, r) => acc + r.length, 0);
  send({ type: 'load_questions', questions: filtered });
  notify(`📤 ${total} question(s) envoyée(s) au serveur`);
});

document.getElementById('btn-launch-questions').addEventListener('click', () => {
  send({ type: 'launch_questions' });
  document.getElementById('btn-launch-questions').style.display = 'none';
  document.getElementById('btn-next-question').style.display = 'inline-block';
  document.getElementById('btn-reveal').style.display = 'inline-block';
  document.getElementById('answer-progress-card').style.display = 'block';

});

document.getElementById('btn-next-question').addEventListener('click', () => {

  document.getElementById('stat-answered').textContent = '0';

});

document.getElementById('btn-reveal').addEventListener('click', () => send({ type: 'reveal' }));

document.getElementById('btn-pause').addEventListener('click', () => {
  paused = !paused;
  send({ type: 'pause' });
  const btn = document.getElementById('btn-pause');
  btn.textContent = paused ? '▶ Reprendre' : '⏸ Pause';
  btn.classList.toggle('active', paused);
});

document.getElementById('btn-final').addEventListener('click', () => {
  if (confirm('Lancer la FINALE ?')) send({ type: 'start_final' });
});

document.getElementById('btn-end-game').addEventListener('click', () => {
  if (confirm('Terminer la partie et afficher le vainqueur ?')) send({ type: 'end_game' });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('⚠ Reset complet ? Tous les joueurs et scores seront perdus.')) send({ type: 'reset' });
});

  const pw = document.getElementById('admin-password').value;
  send({ type: 'admin_login', password: pw });
});
